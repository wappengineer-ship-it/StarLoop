services:
  - type: web
    name: starloop
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: starloop-db
          property: connectionString

databases:
  - name: starloop-db
    plan: basic-256mb
